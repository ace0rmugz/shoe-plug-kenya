<!DOCTYPE html>
<html lang="en">
<head>

    <title>Product Details - Shoe Plug Kenya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

            <div style="margin: 20px 0;">

                    <option value="43">43</option>

                </select>
            </div>

            <button onclick="addDetailedItemToCart()" style="background: #ff4500; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer;">Add to Cart</button>
            <p id="addedMsg" style="color: green; margin-top: 10px;"></p>

    <script src="script.js"></script>

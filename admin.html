<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Shoe Plug Kenya</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 40px; }
        .dashboard { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #111; color: white; }
        .btn { padding: 10px 20px; background: #111; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>✅ Store Manager Dashboard</h1>
        <p>Total Sales Today: <strong>Ksh 12,500</strong></p>
        
        <h3>Inventory Levels</h3>
        <table>
            <tr><th>Shoe</th><th>Price</th><th>Stock</th><th>Action</th></tr>
            <tr><td>AF1 Black</td><td>2500</td><td>15</td><td><button>Edit</button></td></tr>
            <tr><td>Adidas Campus</td><td>3000</td><td>8</td><td><button>Edit</button></td></tr>
            <tr><td>Clarks</td><td>4000</td><td>3</td><td><button>Edit</button></td></tr>
        </table>
        <br>
        <a href="index.html" class="btn">Logout & Exit</a>
    </div>
</body>
</html>

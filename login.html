<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Shoe Plug Kenya</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .login-body { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        .login-container { width: 100%; max-width: 400px; }
        .divider { color: #888; margin: 10px 0; font-weight: bold; }
    </style>
</head>
<body class="login-body">

    <div class="login-container">
        <h2>Welcome to Shoe Plug Kenya</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Enter your name to start shopping</p>
        <input type="text" id="usernameInput" placeholder="Your Name (e.g. Biggie)">
        <button onclick="customerLogin()">Enter Shop</button>
    </div>

    <div class="divider">OR</div>

    <div class="login-container">
        <h2>Admin Login</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Store management only</p>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()" style="background-color: #444;">Login as Admin</button>
        <p id="msg" style="margin-top:15px; font-weight:bold;"></p>
        <br>
        <a href="index.html" style="color:#666; text-decoration:none;">← Back to Store</a>
    </div>

    <script>

        function handleLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            const m = document.getElementById("msg");

            if(u === "Admin" && p === "Forever@8..") {
                m.style.color = "green";
                m.innerText = "Success! Redirecting...";
                setTimeout(() => { window.location.href = "admin.html"; }, 1000);
            } else {
                m.style.color = "red";
                m.innerText = "Invalid credentials!";
            }
        }

        function customerLogin() {
            const name = document.getElementById("usernameInput").value;
            if (name.trim() === "") {
                alert("Tafadhali, enter your name to continue!");
                return;
            }
            localStorage.setItem('username', name);
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

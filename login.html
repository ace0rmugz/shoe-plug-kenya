<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Shoe Plug Kenya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <h2>Admin Login</h2>
        <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">Use admin / 1234</p>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="msg" style="margin-top:15px; font-weight:bold;"></p>
        <br>
        <a href="index.html" style="color:#666; text-decoration:none;">← Back to Store</a>
    </div>

    <script>
        function handleLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            const m = document.getElementById("msg");

            if(u === "admin" && p === "1234") {
                m.style.color = "green";
                m.innerText = "Success! Redirecting...";
                setTimeout(() => { window.location.href = "admin.html"; }, 1000);
            } else {
                m.style.color = "red";
                m.innerText = "Invalid credentials!";
            }
        }
    </script>
</body>
</html>
